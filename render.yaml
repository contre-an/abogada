services:
  - type: web
    name: abogada
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: starter
    envVars:
      - key: NODE_ENV
        value: production
      - key: BAILEYS_AUTH_PATH
        value: /data/session
      - key: LAWYER_PHONE
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
    disk:
      name: baileys-auth
      mountPath: /data
      sizeGB: 1
